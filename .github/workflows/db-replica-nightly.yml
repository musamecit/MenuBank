# Production → yedek Supabase (public şema).
#
# ÖNEMLİ — GitHub Actions IPv6 desteklemez. Supabase "Direct connection"
# (db.xxx.supabase.co) varsayılan olarak IPv6'dır; runner'dan bağlanılamaz.
# SOURCE_DATABASE_URL ve TARGET_DATABASE_URL için mutlaka:
#   Dashboard → Connect → "Session pooler" URI kullanın
#   (host: *.pooler.supabase.com, port 5432)
# Ayrıntı: https://supabase.com/docs/guides/database/connecting-to-postgres
#
# Zaman: ~TR 00:01 (UTC cron 21:01)

name: Nightly database replica backup

on:
  schedule:
    - cron: "1 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Node 24 uyarısı (checkout): https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: db-replica-backup
  cancel-in-progress: true

jobs:
  replica:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Secrets kontrolü
        env:
          SRC: ${{ secrets.SOURCE_DATABASE_URL }}
          DST: ${{ secrets.TARGET_DATABASE_URL }}
        run: |
          if [ -z "$SRC" ] || [ -z "$DST" ]; then
            echo "::error::Eksik secret: SOURCE_DATABASE_URL ve TARGET_DATABASE_URL."
            exit 1
          fi

      - name: Supabase — Session pooler zorunluluğu (GitHub = IPv4)
        env:
          SOURCE_DATABASE_URL: ${{ secrets.SOURCE_DATABASE_URL }}
          TARGET_DATABASE_URL: ${{ secrets.TARGET_DATABASE_URL }}
        run: bash scripts/ci-require-supabase-session-pooler.sh

      - name: Pooler URI yapısı (şifre yok; parse kontrolü)
        env:
          SOURCE_DATABASE_URL: ${{ secrets.SOURCE_DATABASE_URL }}
          TARGET_DATABASE_URL: ${{ secrets.TARGET_DATABASE_URL }}
        run: python3 scripts/validate-pg-pooler-secret.py

      - name: PostgreSQL client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Kaynak DB bağlantı testi
        env:
          PGSSLMODE: require
          PGCONNECT_TIMEOUT: "30"
          SOURCE_DATABASE_URL: ${{ secrets.SOURCE_DATABASE_URL }}
        run: |
          set -euo pipefail
          source scripts/pg-url-normalize.sh
          psql "$(finalize_pg_url "$SOURCE_DATABASE_URL")" -v ON_ERROR_STOP=1 -c "SELECT 1 AS source_ok;"

      - name: Hedef DB bağlantı testi
        env:
          PGSSLMODE: require
          PGCONNECT_TIMEOUT: "30"
          TARGET_DATABASE_URL: ${{ secrets.TARGET_DATABASE_URL }}
        run: |
          set -euo pipefail
          source scripts/pg-url-normalize.sh
          psql "$(finalize_pg_url "$TARGET_DATABASE_URL")" -v ON_ERROR_STOP=1 -c "SELECT 1 AS target_ok;"

      - name: Yedekle (prod salt okunur)
        env:
          PGSSLMODE: require
          PGCONNECT_TIMEOUT: "30"
          REPLICA_SOURCE_READ_ONLY_GUARD: "0"
          REPLICA_SCHEMA_CLEAN: "0"
          SOURCE_DATABASE_URL: ${{ secrets.SOURCE_DATABASE_URL }}
          TARGET_DATABASE_URL: ${{ secrets.TARGET_DATABASE_URL }}
        run: bash scripts/replica-backup.sh
